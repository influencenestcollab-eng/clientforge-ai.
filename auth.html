<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ClientForge AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="auth.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <div class="auth-wrapper">
    <a href="index.html" class="logo auth-logo">CLIENT<span class="grade-text">FORGE</span> AI</a>

    <div class="auth-card glass-panel">

      <!-- Combined Login/Signup Form -->
      <div id="authContent">
        <div class="auth-header">
          <h2 id="authTitle">Sign In</h2>
          <p id="authSubtitle">Enter your credentials to access your account.</p>
        </div>

        <form class="auth-form" id="authForm">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="emailInput" placeholder="you@company.com" autocomplete="email" required/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••" required/>
          </div>
          
          <button type="submit" class="btn-primary btn-full auth-submit" id="authSubmitBtn">Sign In →</button>
          <div class="auth-err" id="authErr"></div>
        </form>

        <div class="auth-toggle">
          <p id="toggleText">Don't have an account? <a href="#" id="toggleAuthMode">Create one</a></p>
        </div>
      </div>

    </div>

    <p class="auth-footer-note">By continuing, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a>.</p>
  </div>

  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
